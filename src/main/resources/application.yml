# src/main/resources/application.yml
spring:
  application:
    name: bus-company-game

  # Base H2 en memoire pour le developpement local
  datasource:
    url: jdbc:h2:mem:busgamedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      # create-drop : recree le schema a chaque demarrage (ideal en dev)
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      # Console H2 accessible sur /h2-console en developpement
      enabled: true
logging:
  level:
    org.flywaydb: DEBUG

# Profil active automatiquement quand Docker lance le conteneur
---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/busgame
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:busgame}
    password: ${DB_PASSWORD:busgame}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    baseline-version: 1.0.0